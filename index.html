<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #09090b; /* Deep slate dark */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Ambient Background Gradients */
        .glow-1 { position: absolute; width: 450px; height: 450px; background: rgba(56, 189, 248, 0.15); filter: blur(130px); border-radius: 50%; top: -150px; left: -150px; z-index: -1; }
        .glow-2 { position: absolute; width: 450px; height: 450px; background: rgba(139, 92, 246, 0.15); filter: blur(130px); border-radius: 50%; bottom: -150px; right: -150px; z-index: -1; }

        /* Glassmorphism Card */
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 45px 35px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 420px;
            width: 90%;
            position: relative;
            z-index: 10;
        }
        
        /* Radar Scanning Animation */
        .radar-box {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 30px auto;
        }
        .radar {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(56, 189, 248, 0.2);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2), inset 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .radar::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; bottom: 50%; right: 50%;
            width: 50%; height: 50%;
            background: linear-gradient(45deg, rgba(56, 189, 248, 0) 0%, rgba(56, 189, 248, 0.9) 100%);
            transform-origin: bottom left;
            border-radius: 0 100% 0 0;
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Icon Animations */
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.3); } 100% { opacity: 1; transform: scale(1); } }

        h2 { font-weight: 600; font-size: 1.6rem; margin: 0 0 12px 0; letter-spacing: 0.5px; }
        p { color: #94a3b8; font-size: 1rem; line-height: 1.6; margin: 0; }
        
        .status-message {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 25px 0 10px 0;
            padding: 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .success-text { color: #34d399; text-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }
        .error-text { color: #f87171; text-shadow: 0 0 15px rgba(248, 113, 113, 0.4); }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="container">
        <!-- Loading State -->
        <div id="loading">
            <div class="radar-box"><div class="radar"></div></div>
            <h2>Analyzing Hardware</h2>
            <p>Running advanced device checks. Please hold still for a moment.</p>
            <div id="debug-info" style="margin-top: 20px; font-size: 0.85rem; color: #64748b; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 6px; display: inline-block;">
                Loading Bot Info...
            </div>
        </div>

        <!-- Result State -->
        <div id="result" style="display: none;">
            <div id="result-icon" class="icon"></div>
            <h2 id="result-title"></h2>
            <div id="result-message" class="status-message"></div>
            <p>You can now safely close this tab and return to Telegram.</p>
        </div>
    </div>

    <script>
        // --- 1. Custom Hardware Fingerprinting Script ---
        async function generateDeviceHash() {
            let storedHash = localStorage.getItem('fp_device_id');
            if (storedHash) return storedHash;

            const traits = [];
            traits.push(navigator.userAgent);
            traits.push(navigator.language);
            traits.push(navigator.hardwareConcurrency || 'unknown');
            traits.push(navigator.deviceMemory || 'unknown');
            traits.push(screen.width + 'x' + screen.height);
            traits.push(screen.colorDepth);
            traits.push(Intl.DateTimeFormat().resolvedOptions().timeZone);

            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 200;
                canvas.height = 50;
                ctx.textBaseline = 'top';
                ctx.font = "14px 'Arial'";
                ctx.textBaseline = 'alphabetic';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText("Fingerprint, \uD83D\uDE03", 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText("Fingerprint, \uD83D\uDE03", 4, 17);
                traits.push(canvas.toDataURL());
            } catch (e) {
                traits.push('canvas-failed');
            }

            const rawString = traits.join('|||');
            const encoder = new TextEncoder();
            const data = encoder.encode(rawString);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            localStorage.setItem('fp_device_id', hashHex);
            return hashHex;
        }

        // --- 2. Evaluation Logic ---
        async function startVerification() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const botId = urlParams.get('bot_id') || 'UnknownBot';

            document.getElementById('debug-info').innerHTML = `Verifying for Bot ID: ${botId}`;

            if (!token) {
                showResult('Error', 'No session token provided in the URL.', false);
                return;
            }

            try {
                const deviceHash = await generateDeviceHash();

                // IMPORTANT: Replace this with your actual Vercel backend URL
                const BACKEND_URL = 'https://device-sooty.vercel.app';

                const response = await fetch(`${BACKEND_URL}/api/session/evaluate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, device_hash: deviceHash })
                });

                const data = await response.json();

                if (data.status === 'verified') {
                    showResult('Verification Complete!', 'Hardware verification passed.', true);
                } else if (data.status === 'rejected') {
                    showResult('Verification Failed', 'Fraud Detected: ' + (data.reason || 'Invalid device'), false);
                } else {
                    showResult('Error', data.error || 'Something went wrong.', false);
                }

            } catch (error) {
                console.error(error);
                showResult('Network Error', 'Failed to connect to verification servers.', false);
            }
        }

        function showResult(title, message, isSuccess) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-icon').textContent = isSuccess ? '🛡️' : '⚠️';
            document.getElementById('result-title').textContent = title;
            
            const msgEl = document.getElementById('result-message');
            msgEl.textContent = message;
            msgEl.className = 'status-message ' + (isSuccess ? 'success-text' : 'error-text');
        }

        // Run scanning animation for a smooth UX before firing
        setTimeout(startVerification, 1500); 
    </script>
</body>
</html>
